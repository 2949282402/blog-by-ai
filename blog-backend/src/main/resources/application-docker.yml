server:
  port: 8081

spring:
  application:
    name: blog-backend
  
  # Docker 环境下使用环境变量配置数据库
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/blog?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:blog_user}
    password: ${SPRING_DATASOURCE_PASSWORD:blog_pass_123}
    driver-class-name: com.mysql.cj.jdbc.Driver
      
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # H2 控制台（仅本地开发使用）
  h2:
    console:
      enabled: false